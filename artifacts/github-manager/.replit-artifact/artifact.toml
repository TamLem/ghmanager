kind = "web"
previewPath = "/"
title = "GitHub Manager"
version = "1.0.0"
id = "artifacts/github-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22238

[services.development]
run = "pnpm --filter @workspace/github-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/github-manager", "run", "build" ]
publicDir = "artifacts/github-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22238"
BASE_PATH = "/"
